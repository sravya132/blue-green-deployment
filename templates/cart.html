<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
<h1 class="title">🛒 Your Cart</h1>

<div class="nav">
<a href="/">Home</a>
<a href="/login">Login</a>
</div>
</header>

{% if cart|length == 0 %}
<h2 style="text-align:center;">Cart is empty 😕</h2>
{% else %}

<table>
<tr>
<th>Product</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for item in cart %}
<tr>
<td>{{ item.name }}</td>
<td>₹{{ item.price }}</td>
<td><a href="/remove/{{ loop.index0 }}">Remove</a></td>
</tr>
{% endfor %}
</table>

<h2 style="text-align:center;">Total: ₹{{ total }}</h2>

<div style="text-align:center;">
<a href="/checkout" class="btn">Proceed to Checkout</a>
</div>

{% endif %}

</body>
</html>
